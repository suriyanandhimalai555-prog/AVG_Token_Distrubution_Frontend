name: Frontend Deploy

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

concurrency:
  group: frontend-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/${{ secrets.GHCR_USERNAME }}/${{ vars.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.PORT }}
          timeout: 60s
          command_timeout: 20m
          debug: true
          script: |
            set -e

            echo "========== SERVER =========="
            hostname
            whoami
            pwd

            echo "========== APPLICATION =========="
            cd ${{ vars.APP_PATH }}

            echo "========== LOGIN TO GHCR =========="
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "${{ secrets.GHCR_USERNAME }}" --password-stdin

            echo "========== PULL LATEST IMAGES =========="
            docker compose pull

            echo "========== RESTART CONTAINERS =========="
            docker compose up -d

            echo "========== REMOVE UNUSED IMAGES =========="
            docker image prune -af

            echo "========== RUNNING CONTAINERS =========="
            docker ps

            echo "========== FRONTEND DEPLOYMENT SUCCESSFUL =========="

      - name: Send Success Email
        if: success()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "✅ Frontend Deployment Successful"
          to: "Sanjayvanan03@gmail.com,muthukdm45@gmail.com,deepakavgprimetech@gmail.com"
          from: ${{ secrets.SMTP_USERNAME }}
          html_body: |
            <h2>✅ Frontend Deployment Successful</h2>

            <table border="1" cellpadding="8" cellspacing="0">
              <tr>
                <td><b>Repository</b></td>
                <td>${{ github.repository }}</td>
              </tr>
              <tr>
                <td><b>Branch</b></td>
                <td>${{ github.ref_name }}</td>
              </tr>
              <tr>
                <td><b>Commit</b></td>
                <td>${{ github.sha }}</td>
              </tr>
              <tr>
                <td><b>Triggered By</b></td>
                <td>${{ github.actor }}</td>
              </tr>
              <tr>
                <td><b>Workflow</b></td>
                <td>${{ github.workflow }}</td>
              </tr>
            </table>

            <br>

            <p>
              <a href="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}">
                View GitHub Actions Run
              </a>
            </p>

      - name: Send Failure Email
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "❌ Frontend Deployment Failed"
          to: "Sanjayvanan03@gmail.com,muthukdm45@gmail.com,deepakavgprimetech@gmail.com"
          from: ${{ secrets.SMTP_USERNAME }}
          html_body: |
            <h2>❌ Frontend Deployment Failed</h2>

            <table border="1" cellpadding="8" cellspacing="0">
              <tr>
                <td><b>Repository</b></td>
                <td>${{ github.repository }}</td>
              </tr>
              <tr>
                <td><b>Branch</b></td>
                <td>${{ github.ref_name }}</td>
              </tr>
              <tr>
                <td><b>Commit</b></td>
                <td>${{ github.sha }}</td>
              </tr>
              <tr>
                <td><b>Triggered By</b></td>
                <td>${{ github.actor }}</td>
              </tr>
              <tr>
                <td><b>Workflow</b></td>
                <td>${{ github.workflow }}</td>
              </tr>
            </table>

            <br>

            <p>
              <a href="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}">
                View GitHub Actions Run
              </a>
            </p>
