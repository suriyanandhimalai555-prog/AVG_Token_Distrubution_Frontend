name: Deploy Frontend

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy Frontend
        uses: appleboy/ssh-action@v1.0.3

        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd ~/otp/apps/AVG_TOKEN_DISTRIBUTION/AVG_Token_Distrubution_Frontend

            git pull origin main

            cd ..

            docker compose build holderforge-frontend

            docker compose up -d holderforge-frontend
